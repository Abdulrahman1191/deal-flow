name: Claude Builder

on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]

jobs:
  build:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trim OAuth token
        id: trim
        run: |
          T="${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}"
          T="$(printf '%s' "$T" | tr -d '\r\n\t ' )"
          echo "::add-mask::$T"
          echo "token=$T" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ steps.trim.outputs.token }}
          show_full_output: true  # TEMP: debug wiring; remove after loop verified
          # Allow the reviewer's "@claude fix ..." comments (posted as claude[bot])
          # to trigger fix passes. All other bots stay blocked.
          allowed_bots: "claude[bot]"
          claude_args: |
            --model claude-sonnet-5
            --max-turns 60
            --allowedTools "Bash(pytest:*),Bash(python3:*),Bash(pip:*),Bash(pip3:*),Bash(cd:*),Bash(npm:*),Bash(npx:*)"
