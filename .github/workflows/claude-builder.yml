name: Claude Builder

on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]

jobs:
  build:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true  # TEMP: debug wiring; remove after loop verified
          # Allow the reviewer's "@claude fix ..." comments (posted as claude[bot])
          # to trigger fix passes. All other bots stay blocked.
          allowed_bots: "claude[bot]"
          claude_args: |
            --model claude-fable-5
            --max-turns 60
