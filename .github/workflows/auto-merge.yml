name: Auto Merge

# When the reviewer applies ready-for-qa (reviewer passed + CI green),
# squash-merge the agent PR so it ships to production. Abdulrahman QAs live.

on:
  pull_request:
    types: [labeled]

jobs:
  merge:
    if: github.event.label.name == 'ready-for-qa' && startsWith(github.event.pull_request.head.ref, 'claude/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Squash merge when checks are green
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          # --auto waits for required status checks before merging
          gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --squash --auto --delete-branch
